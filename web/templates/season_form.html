{% extends "base.html" %}

{% block title %}
Neue Saison – ASV Manager
{% endblock %}

{% block content %}

<div class="page-header">
    <div>
        <h1>Neue Saison</h1>
        <p>Eine neue Saison für den ASV Manager anlegen</p>
    </div>
</div>

<div class="card">

    <form method="post" action="{% if season %}/seasons/{{ season.season_id }}{% else %}/seasons/new{% endif %}">

        <div class="form-group">
            <label for="name">Bezeichnung der Saison</label>
            <input
                id="name"
                name="name"
                class="form-control"
                type="text"
                placeholder="Zum Beispiel 2026/27 oder Herbst 2026"
                value="{{ season.name if season else '' }}"
                required
                autofocus
            >
        </div>

        <div class="form-group">
            <label class="checkbox-label" for="active">
                <input
                    id="active"
                    name="active"
                    type="checkbox"
                    value="true"
                    {% if not season or season.active %}checked{% endif %}
                >
                Saison ist aktiv
            </label>
        </div>

        <div class="form-actions">
            <button class="button" type="submit">
                Saison speichern
            </button>

            <a class="button button-secondary" href="/seasons">
                Abbrechen
            </a>
        </div>

    </form>

</div>

{% endblock %}
